<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Valida AI</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f4f4;
            padding: 50px;
        }

        .card {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        h1 {
            color: #AC123B;
            margin-top: 0;
        }

        .info {
            background: #f8f8f8;
            border-left: 4px solid #AC123B;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .arquivo-area {
            margin-top: 20px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .btn-importar {
            display: inline-block;
            background: #F58220;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }

        .btn-validar {
            background: #AC123B;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-importar:hover,
        .btn-validar:hover {
            opacity: .9;
        }

        .nome-arquivo {
            margin-top: 12px;
            color: #333;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Valida AI</h1>

        <div class="info">
            Importe o JSON retornado pela IA. O sistema identificará automaticamente
            o tipo documental pela primeira chave do JSON e o GED pelo nome do arquivo.
        </div>

        /validar

            <div class="arquivo-area">

                <label for="json" class="btn-importar">
                    Importar JSON
                </label>

                <input
                    type="file"
                    id="json"
                    name="json"
                    accept=".json"
                    required
                    onchange="mostrarNomeArquivo()"
                >

                <div id="nomeArquivo" class="nome-arquivo">
                    Nenhum arquivo selecionado.
                </div>

            </div>

            <button type="submit" class="btn-validar">
                VALIDAR
            </button>

        </form>

    </div>

    <script>
        function mostrarNomeArquivo() {
            const input = document.getElementById("json");
            const nomeArquivo = document.getElementById("nomeArquivo");

            if (input.files.length > 0) {
                nomeArquivo.textContent = "Arquivo selecionado: " + input.files[0].name;
            } else {
                nomeArquivo.textContent = "Nenhum arquivo selecionado.";
            }
        }
    </script>

</body>

</html>
