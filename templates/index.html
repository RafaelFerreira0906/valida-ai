<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Valida AI</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f4f4;
            padding: 50px;
        }

        .card {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        h1 {
            color: #AC123B;
            margin-top: 0;
        }

        .info {
            background: #f8f8f8;
            border-left: 4px solid #AC123B;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        input[type="file"] {
            width: 100%;
            margin-bottom: 20px;
        }

        button {
            background: #AC123B;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: .9;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Valida AI</h1>

        <div class="info">
            Selecione o JSON retornado pela IA. O sistema identificará automaticamente
            o tipo documental e o GED pelo nome do arquivo.
        </div>

        /validar

            <label for="json">Importar JSON</label>

            <input
                type="file"
                id="json"
                name="json"
                accept=".json"
                required
            >

            <button type="submit">
                VALIDAR
            </button>

        </form>

    </div>

</body>

</html>
