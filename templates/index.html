<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Valida AI</title>

    <style>

        body{
            font-family:Segoe UI;
            background:#f4f4f4;
            padding:50px;
        }

        .card{
            background:white;
            max-width:600px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        h1{
            color:#AC123B;
        }

        button{
            background:#AC123B;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>Valida AI</h1>

    
<form
    action="/validar"
    method="POST"
    enctype="multipart/form-data"
>


        <p>EXCEL</p>

        <input
            type="file"
            name="excel"
            accept=".xlsx"
            required
        >

        <br><br>

        <p>JSON (Resultado IA)</p>

        <input
            type="file"
            name="json"
            accept=".json"
            required
        >

        <br><br>

        <button type="submit">
            VALIDAR
        </button>

    </form>

</div>

</body>
</html>
